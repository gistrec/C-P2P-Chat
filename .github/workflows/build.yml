name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  linux:
    name: Build on Ubuntu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libncursesw5-dev

      - name: Configure
        run: cmake -S . -B build

      - name: Build
        run: cmake --build build -- -j 2

  macos:
    name: Build on macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install ncurses cmake

      - name: Configure
        run: cmake -S . -B build

      - name: Build
        run: cmake --build build -- -j 2
